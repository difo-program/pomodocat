<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Pomodoro App</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./style.css" />

    </head>
    <body>

        <div class="app-container">
            <h1>pomodoro</h1>
            <div class="app-message">press start to begin</div>
            <div class="app-image"><img class="image" src="./assets/pomocat-pause.png"></div>
  
            <div class="app-counter-box">
                <p><span class="minutes">25</span>:<span class="seconds">00</span></p>
            </div>
            <button class="btn-start">start</button>
            <button class="btn-pause">pause</button>
            <button class="btn-reset">Reset</button>
            </div>
            </div>
            <div class = "buttons-wrapper">
                <button class="btn-menu-timer">Pomodoro</button>
                <button class="btn-menu-short">Short Break</button>
                <button class="btn-menu-long">Long Break</button>
            </div>
       
        <script src="./app.js"></script>
    </body>
</html>
